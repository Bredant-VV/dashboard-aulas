<!DOCTYPE html>
<html>
<head>
    <title>Vista Móvil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
        }

        .botones {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background-color: #222;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        button {
            flex: 1;
            margin: 5px;
            padding: 15px;
            font-size: 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
        }

        iframe {
            width: 100%;
            height: 90vh;
            border: none;
        }
    </style>

    <script>
        function cambiarModulo(modulo) {
            document.getElementById("visor").src = "/modulo/" + modulo;
        }
    </script>
</head>
<body>

    <iframe id="visor" src="/modulo/A"></iframe>

    <div class="botones">
        <button onclick="cambiarModulo('A')">A</button>
        <button onclick="cambiarModulo('B')">B</button>
        <button onclick="cambiarModulo('C')">C</button>
        <button onclick="cambiarModulo('D')">D</button>
    </div>

</body>
</html>
