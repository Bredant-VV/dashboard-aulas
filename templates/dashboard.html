<!DOCTYPE html>
<html>
<head>
    <title>Módulo A</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #003366;
            color: white;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px;
        }

        .card {
            padding: 20px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .libre {
            background-color: #28a745;
        }

        .ocupada {
            background-color: #dc3545;
        }

        h2 {
            margin: 10px 0;
        }

    </style>
</head>
<body>

<h1>MÓDULO A – HORARIOS HOY</h1>

<div class="container">
    {% for aula in aulas %}
        <div class="card {{ aula.estado }}">
            <h2>{{ aula.nombre }}</h2>

            {% if aula.estado == "libre" %}
                🟢 Libre
            {% else %}
                🔴 {{ aula.materia }}<br>
                {{ aula.carrera }}<br>
                {{ aula.hora }}
            {% endif %}
        </div>
    {% endfor %}
</div>

</body>
</html>
